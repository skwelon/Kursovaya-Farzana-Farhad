<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- HEADER -->

    <header>
      <div class="logo">SportWear</div>

      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="catalog.html">Catalog</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html" class="active">Contacts</a></li>
        </ul>
      </nav>
    </header>

    <!-- CONTACT PAGE -->

    <section class="contact-page">
      <h1>Contact Us</h1>

      <div class="contact-container">
        <!-- CONTACT INFO -->

        <div class="contact-info">
          <h2>Our Contacts</h2>

          <p><strong>Phone:</strong> +994 50 123 45 67</p>

          <p><strong>Email:</strong> sportwear@gmail.com</p>

          <p><strong>Address:</strong> Baku, Azerbaijan</p>
        </div>

        <!-- CONTACT FORM -->

        <div class="contact-form">
          <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" />

            <input type="email" id="email" placeholder="Your Email" />

            <textarea id="message" placeholder="Your Message"></textarea>

            <button type="submit">Send Message</button>

            <p id="formMessage"></p>
          </form>
        </div>
      </div>
    </section>

    <!-- FOOTER -->

    <footer>
      <p>© 2026 SportWear. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
